name: Next.js CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # ✅ Remove reportWebVitals and ReportHandler if present
      - name: Remove reportWebVitals files
        run: rm -f reportWebVitals.ts reportWebVitals.js

      - name: Remove reportWebVitals imports
        run: |
          grep -rl "reportWebVitals" . | xargs sed -i '/reportWebVitals/d'
          grep -rl "ReportHandler" . | xargs sed -i '/ReportHandler/d'

      - name: Build Next.js app
        run: npm run build

      - name: Export static site
        run: npm run export

      - name: Upload production-ready build
        uses: actions/upload-artifact@v3
        with:
          name: nextjs-build
          path: out
