name: Next.js CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Remove reportWebVitals files
        run: rm -f reportWebVitals.ts reportWebVitals.js

      - name: Remove reportWebVitals imports
        run: |
          grep -rl "reportWebVitals" . | xargs sed -i '/reportWebVitals/d' || true
          grep -rl "ReportHandler" . | xargs sed -i '/ReportHandler/d' || true

      - name: Build Next.js app
        run: npm run build

      - name: Export static site
        run: npm run export

      - name: Upload production-ready build
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: out
